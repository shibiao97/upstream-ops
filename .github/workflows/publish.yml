name: Publish Docker Image

# 触发：
#   - 推送到 main 分支             → 发 :edge 跟踪标签
#   - 推送形如 v0.0.1 的 git tag    → 发 :v0.0.1 + :0.0 + :latest
#   - 手动触发                      → 可填自定义 tag
#
# 所有构建都附带一个 :sha-xxxxxxx 短 hash tag，方便回滚到任意 commit。
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: '额外推送的镜像 tag（可选，如 dev-test）'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU 让 amd64 runner 能跑 arm64 emulation 出 ARM 镜像。
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 用 GITHUB_TOKEN 登录 ghcr.io，不需要额外配 secret。
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 根据触发场景自动算 tag：semver tag → v0.0.1 / 0.0 / latest；main → edge；
      # 任何场景都额外加一个 sha-xxxxxxx 作为不可变快照。
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=sha,prefix=sha-,format=short
          flavor: |
            latest=false

      # 多架构构建 + 推送。GitHub Actions 内置 cache (type=gha) 把
      # 前端 pnpm install 和后端 go mod download 都缓存住，二次构建 1-2 分钟。
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        run: |
          echo "### Pushed images" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
