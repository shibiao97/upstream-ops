#:schema https://json.schemastore.org/any.json

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./cmd/server"
  entrypoint = ["./tmp/server"]
  include_ext = ["go", "tpl", "tmpl", "html", "yaml"]
  exclude_dir = ["tmp", "vendor", "data", "frontend", "web/dist"]
  include_dir = ["backend", "cmd", "web"]
  include_file = ["config.yaml", "go.mod", "go.sum"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  delay = 5000
  stop_on_error = true
  log = "air_errors.log"

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = false
